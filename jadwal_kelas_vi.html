<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jadwal Pelajaran Kelas VI — SDIT Ar-Rahmah</title>
<style>
:root{
  --blue:#2F9FE0;
  --blue-dark:#1C7FC2;
  --blue-bg:#EAF6FD;
  --gold:#F5A93B;
  --gold-dark:#E0921F;
  --purple:#6C5CE7;
  --purple-dark:#5847C9;
  --teal:#22B8A6;
  --teal-dark:#1B9887;
  --gray-bg:#EEF2F6;
  --navy:#1E2A3A;
  --muted:#7C8A9A;
  --white:#FFFFFF;
  --radius-lg:22px;
  --radius-md:16px;
  --radius-sm:12px;
  --shadow:0 8px 24px rgba(31,66,102,0.10);
  --shadow-sm:0 4px 12px rgba(31,66,102,0.08);
}
*{box-sizing:border-box;}
body{
  margin:0;
  font-family:'Segoe UI', 'Poppins', Arial, sans-serif;
  background: linear-gradient(180deg,#DFF2FC 0%, #EAF6FD 40%, #F4FAFE 100%);
  min-height:100vh;
  color:var(--navy);
  padding:28px 12px 60px;
}
.app{
  max-width:460px;
  margin:0 auto;
  background:var(--white);
  border-radius:32px;
  box-shadow:0 20px 50px rgba(31,66,102,0.16);
  overflow:hidden;
  padding-bottom:14px;
}
.header{
  background: linear-gradient(135deg, var(--blue) 0%, var(--blue-dark) 100%);
  color:var(--white);
  padding:26px 22px 68px;
  position:relative;
}
.header .greet-label{font-size:13px;opacity:.85;font-weight:400;}
.header h1{margin:2px 0 0; font-size:22px; font-weight:700; display:flex; align-items:center; gap:8px;}
.header .sub{margin-top:6px;font-size:12.5px;opacity:.9;}
.header .icon-btn{
  position:absolute; top:26px; right:22px;
  width:38px;height:38px;border-radius:12px;
  background:rgba(255,255,255,0.18);
  display:flex;align-items:center;justify-content:center;
  font-size:16px;
}
.search-card{
  margin:-46px 18px 0;
  background:var(--white);
  border-radius:var(--radius-lg);
  box-shadow:var(--shadow);
  padding:10px 14px;
  display:flex;
  gap:10px;
  position:relative;
  z-index:5;
}
.search-card input{
  flex:1;border:none;outline:none;font-size:14px;background:transparent;color:var(--navy);
}
.search-card .search-ico{
  width:34px;height:34px;border-radius:10px;background:var(--blue-bg);
  display:flex;align-items:center;justify-content:center;color:var(--blue-dark);font-size:15px;
}

.segment{
  display:flex;
  margin:20px 18px 4px;
  background:var(--gray-bg);
  border-radius:999px;
  padding:4px;
  gap:4px;
}
.segment button{
  flex:1;
  border:none;
  background:transparent;
  padding:10px 8px;
  border-radius:999px;
  font-size:13.5px;
  font-weight:600;
  color:var(--muted);
  cursor:pointer;
  transition:.2s;
}
.segment button.active{
  background:var(--blue);
  color:var(--white);
  box-shadow:var(--shadow-sm);
}

.section-title{
  margin:18px 18px 8px;
  font-size:15px;
  font-weight:700;
  color:var(--navy);
}

.chips-row{
  display:flex;
  gap:8px;
  margin:0 18px 6px;
  overflow-x:auto;
  padding-bottom:4px;
  scrollbar-width:none;
}
.chips-row::-webkit-scrollbar{display:none;}
.chip{
  flex:0 0 auto;
  padding:9px 16px;
  border-radius:999px;
  font-size:13px;
  font-weight:600;
  border:1.5px solid #E1E9F0;
  background:var(--white);
  color:var(--muted);
  cursor:pointer;
  white-space:nowrap;
  transition:.15s;
}
.chip.day-chip.active{background:var(--blue); border-color:var(--blue); color:var(--white);}

.chips-col{
  display:flex;
  flex-direction:column;
  gap:8px;
  margin:0 18px 6px;
}
.chip.class-chip{
  border-radius:14px;
  width:100%;
  text-align:left;
  padding:12px 16px;
}
.chip.class-chip.active{background:var(--purple); border-color:var(--purple); color:var(--white);}

.view{padding:6px 18px 18px;}
.view.hidden{display:none;}

.period-card{
  display:flex;
  align-items:flex-start;
  gap:12px;
  background:var(--white);
  border:1.5px solid #EEF2F6;
  border-radius:var(--radius-md);
  padding:13px 14px;
  margin-bottom:10px;
  box-shadow:var(--shadow-sm);
}
.period-card .time-col{
  min-width:64px;
  font-size:11.5px;
  font-weight:700;
  color:var(--muted);
  line-height:1.3;
  padding-top:3px;
}
.period-card .icon-chip{
  width:38px;height:38px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  font-size:17px;flex:0 0 auto;
}
.period-card .subj-name{font-size:14px;font-weight:700;color:var(--navy);line-height:1.3;}
.period-card .subj-tag{font-size:11px;font-weight:600;margin-top:3px;display:inline-block;padding:2px 8px;border-radius:8px;}

.cat-ibadah .icon-chip{background:#EEEAFD;color:var(--purple);}
.cat-ibadah .subj-tag{background:#EEEAFD;color:var(--purple-dark);}
.cat-akademik .icon-chip{background:var(--blue-bg);color:var(--blue-dark);}
.cat-akademik .subj-tag{background:var(--blue-bg);color:var(--blue-dark);}
.cat-ekstra .icon-chip{background:#E4F8F5;color:var(--teal-dark);}
.cat-ekstra .subj-tag{background:#E4F8F5;color:var(--teal-dark);}
.cat-evaluasi .icon-chip{background:#FDF1DE;color:var(--gold-dark);}
.cat-evaluasi .subj-tag{background:#FDF1DE;color:var(--gold-dark);}
.cat-istirahat{opacity:.7;}
.cat-istirahat .icon-chip{background:var(--gray-bg);color:var(--muted);}
.cat-istirahat .subj-tag{background:var(--gray-bg);color:var(--muted);}

.teacher-card{
  background:var(--white);
  border:1.5px solid #EEF2F6;
  border-radius:var(--radius-md);
  padding:14px 16px;
  margin-bottom:12px;
  box-shadow:var(--shadow-sm);
}
.teacher-card .top-row{display:flex; align-items:center; justify-content:space-between; margin-bottom:10px;}
.teacher-card .avatar-row{display:flex;align-items:center;gap:10px;}
.teacher-avatar{
  width:40px;height:40px;border-radius:12px;
  background:linear-gradient(135deg, var(--blue), var(--purple));
  display:flex;align-items:center;justify-content:center;
  color:white;font-weight:700;font-size:15px;
}
.teacher-name{font-size:14.5px;font-weight:700;color:var(--navy);}
.teacher-no{font-size:11px;color:var(--muted);font-weight:600;}
.total-pill{
  background:var(--gold);
  color:white;
  font-size:12.5px;
  font-weight:700;
  padding:6px 12px;
  border-radius:999px;
  white-space:nowrap;
}
.subject-pills{display:flex;flex-wrap:wrap;gap:6px;}
.subj-pill{
  font-size:11px;
  font-weight:600;
  padding:4px 10px;
  border-radius:8px;
}
.progress-track{
  height:6px;
  background:var(--gray-bg);
  border-radius:999px;
  margin-top:10px;
  overflow:hidden;
}
.progress-fill{
  height:100%;
  background:linear-gradient(90deg, var(--blue), var(--purple));
  border-radius:999px;
}

.bottom-nav{
  display:flex;
  justify-content:space-around;
  align-items:center;
  margin:16px 18px 4px;
  background:var(--white);
  border-radius:20px;
  padding:10px 6px;
  box-shadow:var(--shadow);
  border:1.5px solid #EEF2F6;
}
.nav-item{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  font-size:10.5px;font-weight:600;color:var(--muted);
  padding:6px 14px;border-radius:14px;
  cursor:default;
}
.nav-item.active{background:var(--blue); color:white;}
.nav-item .nav-ico{font-size:16px;}

.legend{
  display:flex;flex-wrap:wrap;gap:10px;
  margin:14px 18px 4px;
  font-size:10.5px;
  color:var(--muted);
}
.legend span{display:flex;align-items:center;gap:5px;}
.legend .dot{width:9px;height:9px;border-radius:50%;display:inline-block;}

.empty-state{
  text-align:center;
  padding:30px 10px;
  color:var(--muted);
  font-size:13px;
}
</style>
</head>

<div class="app">

  <div class="header">
    <div class="greet-label">Assalamu'alaikum, Cikgu 👋</div>
    <h1>Jadwal Kelas VI</h1>
    <div class="sub">SDIT Ar-Rahmah • T.P. 2026-2027</div>
    <div class="icon-btn">☰</div>
  </div>

    <div id="periodList" style="margin-top:10px;"></div>
  </div>

  <!-- ===== VIEW: REKAP ===== -->
  <div id="view-rekap" class="view hidden">

  <div class="bottom-nav">
    <div class="nav-item" id="nav-jadwal-btn" onclick="switchView('jadwal')">

    </div>
    <div class="nav-item" id="nav-rekap-btn" onclick="switchView('rekap')">
      <div class="nav-ico">👩‍🏫</div>Rekap Guru
    </div>
  </div>

</div>

const CLASSES = ["VI Ranggong Daeng Romo", "VI Opu Daeng Risadju", "VI La Maddukelleng"];
const DAYS = ["Senin", "Selasa", "Rabu", "Kamis", "Jum'at"];

let currentClass = CLASSES[0];
let currentDay = DAYS[0];

const CATEGORY_KEYWORDS = {
  ibadah: ['dhuha','tahfidz',"al qur'an",'wafa'],
  istirahat: ['istirahat','qailullah','ishoma'],
  evaluasi: ['karakter','evaluasi'],
  ekstra: ['pjok','pandu','isc','bakat'],
};
const ICONS = {
  ibadah: '🕌', istirahat: '☕', evaluasi: '📝', ekstra: '🤸', akademik: '📘'
};

function categorize(text){
  if(!text) return 'istirahat';
  const t = text.toLowerCase();
  for(const [cat, keys] of Object.entries(CATEGORY_KEYWORDS)){
    if(keys.some(k => t.includes(k))) return cat;
  }
  return 'akademik';
}

function renderChips(){
  const classChips = document.getElementById('classChips');
  classChips.innerHTML = CLASSES.map(c =>
    `<div class="chip class-chip ${c===currentClass?'active':''}" onclick="selectClass('${c.replace(/'/g,"\\'")}')">${c}</div>`
  ).join('');

  const dayChips = document.getElementById('dayChips');
  dayChips.innerHTML = DAYS.map(d =>
    `<div class="chip day-chip ${d===currentDay?'active':''}" onclick="selectDay('${d.replace(/'/g,"\\'")}')">${d}</div>`
  ).join('');
}

function selectClass(c){ currentClass = c; renderChips(); renderPeriods(); }
function selectDay(d){ currentDay = d; renderChips(); renderPeriods(); }

function renderPeriods(){
  const rows = SCHEDULE[currentDay] || [];
  const list = document.getElementById('periodList');
  if(rows.length === 0){
    list.innerHTML = `<div class="empty-state">Tidak ada jadwal untuk hari ini.</div>`;
    return;
  }
  list.innerHTML = rows.map(row => {
    const subj = row[currentClass] || '-';
    const cat = categorize(subj);
    return `
    <div class="period-card cat-${cat}">
      <div class="time-col">${row.waktu}</div>
      <div class="icon-chip">${ICONS[cat]}</div>
      <div>
        <div class="subj-name">${subj}</div>
        <span class="subj-tag">${cat === 'akademik' ? 'Akademik' : cat==='ibadah' ? 'Ibadah' : cat==='ekstra' ? 'Ekstra' : cat==='evaluasi' ? 'Evaluasi' : 'Istirahat'}</span>
      </div>
    </div>`;
  }).join('');
}

function subjColor(label){
  const t = label.toLowerCase();
  if(['wafa','tahfidz','l.s','ishoma'].includes(t)) return 'ibadah';
  if(['pjok','pandu','isc','k. bakat'].includes(t)) return 'ekstra';
  if(t === 'karakter') return 'evaluasi';
  return 'akademik';
}

function renderTeachers(filter){
  filter = (filter||'').toLowerCase();
  const list = document.getElementById('teacherList');
  const maxTotal = Math.max(...RECAP.map(r=>r.total||0));
  const filtered = RECAP.filter(r => {
    if(!filter) return true;
    if(r.nama.toLowerCase().includes(filter)) return true;
    return Object.keys(r.subjects).some(s => s.toLowerCase().includes(filter));
  });
  if(filtered.length === 0){
    list.innerHTML = `<div class="empty-state">Tidak ditemukan.</div>`;
    return;
  }
  list.innerHTML = filtered.map(r => {
    const initials = r.nama.split(' ').map(w=>w[0]).slice(0,2).join('').toUpperCase();
    const pills = Object.entries(r.subjects).map(([label,val]) => {
      const cat = subjColor(label);
      return `<span class="subj-pill" style="background:${cat==='ibadah'?'#EEEAFD':cat==='ekstra'?'#E4F8F5':cat==='evaluasi'?'#FDF1DE':'#EAF6FD'};color:${cat==='ibadah'?'#5847C9':cat==='ekstra'?'#1B9887':cat==='evaluasi'?'#E0921F':'#1C7FC2'}">${label} ${val}j</span>`;
    }).join('');
    const pct = Math.min(100, Math.round((r.total / maxTotal) * 100));
    return `
    <div class="teacher-card">
      <div class="top-row">
        <div class="avatar-row">
          <div class="teacher-avatar">${initials}</div>
          <div>
            <div class="teacher-name">${r.nama}</div>
            <div class="teacher-no">Total mengajar</div>
          </div>
        </div>
        <div class="total-pill">${r.total} jam</div>
      </div>
      <div class="subject-pills">${pills}</div>
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
    </div>`;
  }).join('');
}

function switchView(view){
  document.getElementById('view-jadwal').classList.toggle('hidden', view!=='jadwal');
  document.getElementById('view-rekap').classList.toggle('hidden', view!=='rekap');
  document.getElementById('tab-jadwal').classList.toggle('active', view==='jadwal');
  document.getElementById('tab-rekap').classList.toggle('active', view==='rekap');
  document.getElementById('nav-jadwal-btn').classList.toggle('active', view==='jadwal');
  document.getElementById('nav-rekap-btn').classList.toggle('active', view==='rekap');
  document.getElementById('searchInput').value = '';
  if(view==='rekap') renderTeachers('');
}

function handleSearch(){
  const val = document.getElementById('searchInput').value;
  const rekapVisible = !document.getElementById('view-rekap').classList.contains('hidden');
  if(rekapVisible){
    renderTeachers(val);
  }
}
